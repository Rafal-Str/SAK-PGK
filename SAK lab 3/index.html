<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fajerwerki</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: black; overflow: hidden; cursor: crosshair; }
        canvas { display: block; }
                body {
            background: #000;
            overflow: hidden;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        #controls {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            border: 1px solid black;
            border-radius: 8px;
            padding: 10px 20px;
            display: flex;
            gap: 24px;
            align-items: center;
            color: white;
            font-size: 13px;
            backdrop-filter: blur(4px);
            z-index: 10;
        }

        #controls label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        #controls input[type="range"] {
            width: 120px;
            cursor: pointer;
            accent-color: blue;
        }

        #controls span {
            color: blue;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }

        #info {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            color: grey;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="controls"> <!--podstawowe ustawienia, suwaki nie działają brak logiki-->
    <label>
        Grawitacja
        <input type="range" id="gravitySlider" min="0.01" max="0.5" step="0.01" value="0.25">
        <span id="gravityVal">0.08</span>
    </label>
    <label>
        Cząsteczki
        <input type="range" id="particleSlider" min="30" max="300" step="10" value="130">
        <span id="particleVal">120</span>
    </label>
    <label>
        Auto (s)
        <input type="range" id="autoSlider" min="0.5" max="5" step="0.5" value="2.5">
        <span id="autoVal">2.0</span>
    </label>
</div>
    <script src="script.js"></script>
</body>
</html>
